name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version was bumped
        run: |
          PR_VERSION=$(cat VERSION)
          MAIN_VERSION=$(git show origin/main:VERSION 2>/dev/null || echo "0.0.0")

          if [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
            echo "::error::VERSION was not bumped. Current: $MAIN_VERSION"
            echo ""
            echo "Before merging, bump the version in VERSION and update CHANGELOG.md."
            echo "  main version: $MAIN_VERSION"
            echo "  PR version:   $PR_VERSION"
            exit 1
          fi

          echo "Version bump detected: $MAIN_VERSION -> $PR_VERSION"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.python-version }}-
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -m "not fuzz" -v

  fuzz:
    runs-on: ubuntu-latest
    # Run on push to main and on the nightly schedule, but not on PRs
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-3.12-
      - name: Cache hypothesis database
        uses: actions/cache@v4
        with:
          path: .hypothesis
          key: hypothesis-${{ github.ref_name }}
          restore-keys: hypothesis-
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -m fuzz -v
        env:
          HYPOTHESIS_PROFILE: ci

  vendor-check:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - name: Trigger vendor CI with PR branch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.VENDOR_CI_TOKEN }}
          repository: macleapatrick/plx-vendor
          event-type: public-repo-check
          client-payload: '{"ref": "${{ github.head_ref }}", "pr": "${{ github.event.number }}"}'
